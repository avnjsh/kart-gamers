<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Kart Gamers</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: rgba(18, 20, 29, 0.85);
            --primary-color: #ff3e3e;
            --primary-hover: #e03232;
            --accent-color: #00f0ff;
            --text-main: #ffffff;
            --text-muted: #8a8f98;
            --input-bg: #161923;
            --input-border: #262b3c;
            --input-focus: #3f4763;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1c29 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative Background Elements for Gaming Vibe */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--primary-color);
            filter: blur(150px);
            opacity: 0.15;
            z-index: 0;
        }

        body::before { top: -50px; left: -50px; background: var(--accent-color); }
        body::after { bottom: -50px; right: -50px; }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--input-border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--text-main) 50%, var(--primary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .brand h1 span {
            color: var(--accent-color);
            -webkit-text-fill-color: var(--accent-color);
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.15);
            background-color: #1a1e2a;
        }

        .form-control:focus + label {
            color: var(--accent-color);
        }

        .btn-submit {
            width: 100%;
