<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Kart Gamers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a12;
            --card-bg: rgba(18, 18, 32, 0.85);
            --primary-neon: #ff0055;
            --secondary-neon: #00f0ff;
            --text-main: #ffffff;
            --text-muted: #8b8ba7;
            --input-bg: #161626;
            --border-color: #2a2a40;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Grid Background for Gaming Aesthetic */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(to right, rgba(255, 0, 85, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 0, 85, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 
                        0 0 15px rgba(0, 240, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Top Accent Bar */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 30%, var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary-neon);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
            background-color: #1a1a2e;
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            color: var(--text-muted);
        }

        .remember-me input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 18px;
            width: 18px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-right: 8px;
            position: relative;
            transition: all 0.2s ease;
        }

        .remember-me:hover input ~ .checkmark {
            border-color: var(--primary-neon);
        }

        .remember-me input:checked ~ .checkmark {
            background-color: var(--primary-neon);
            border-color: var(--primary-neon);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .remember-me input:checked ~ .checkmark:after {
            display: block;
        }

        .forgot-password {
            color: var(--secondary-neon);
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 600;
        }

        .forgot-password:hover {
            color: #fff;
            text-shadow: 0 0 5px var(--secondary-neon);
        }

        .btn-signin {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-neon), #d00045);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 85, 0.5);
            background: linear-gradient(135deg, #ff1a6c, var(--primary-neon));
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--secondary-neon);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s ease;
            margin-left: 5px;
        }

        .signup-link a:hover {
            color: #fff;
            text-shadow: 0 0 5px var(--secondary-neon);
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .login-container {
                padding: 30px 20px;
            }
            .brand h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand">
            <h1>Kart Gamers</h1>
            <p>Ready to Race?</p>
        </div>

        <form action="#" method="POST" autocomplete="off">
            <div class="form-group">
                <label for="username">Email or Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" class="form-control" required placeholder="Enter gamer tag or email">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span class="checkmark"></span>
                    Remember Me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <div class="signup-link">
            New to the grid? <a href="#">Sign Up Now</a>
        </div>
    </div>

</body>
</html>
